<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fuel">
<meta name="theme-color" content="#08090d">
<title>Daytime Fuel</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Daytime%20Fuel%22%2C%22short_name%22%3A%22Fuel%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2308090d%22%2C%22theme_color%22%3A%22%2308090d%22%2C%22start_url%22%3A%22.%22%7D">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090d; --s:#0c0e14; --b:#1a1e2a; --t:#c8ccd4; --tm:#5a5f6e; --td:#2e3240;
    --a:#3dd9a0; --aDim:#13332a; --w:#e8a838; --d:#e85d4a; --bl:#4a8fe8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--t);font-family:'Outfit',sans-serif;
    padding:18px 14px 40px;max-width:560px;margin:0 auto;}
  h1{font-size:22px;font-weight:700;margin:0}
  .eyebrow{font-size:9px;color:var(--a);text-transform:uppercase;letter-spacing:3px;
    font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
  .mono{font-family:'IBM Plex Mono',monospace}
  .sub{font-size:10px;color:var(--td);font-family:'IBM Plex Mono',monospace;margin-top:4px;line-height:1.5}
  .row{display:flex;gap:6px}
  .btn{flex:1;padding:9px 6px;background:transparent;border:1px solid var(--b);border-radius:8px;
    color:var(--tm);font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-align:center}
  .btn.on{background:var(--aDim);border-color:var(--a);color:var(--a)}
  .btn .k{font-size:9px;color:var(--td);font-family:'IBM Plex Mono',monospace;margin-top:2px;font-weight:400}
  .card{background:var(--s);border:1px solid var(--b);border-radius:10px}
  .lbl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:1.5px;
    font-family:'IBM Plex Mono',monospace}
  .day{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:10px 14px;margin-bottom:6px;cursor:pointer}
  .chip{padding:2px 6px;border-radius:4px;font-size:9px;font-family:'IBM Plex Mono',monospace}
  input[type=number]{background:var(--bg);border:1px solid var(--b);border-radius:8px;color:var(--t);
    font-family:'IBM Plex Mono',monospace;font-size:15px;padding:8px 10px;width:100%;text-align:center}
  input[type=number]::-webkit-inner-spin-button{opacity:.4}
  .seg{display:flex;gap:0;border:1px solid var(--b);border-radius:8px;overflow:hidden}
  .seg button{flex:1;padding:8px;background:transparent;border:none;color:var(--tm);font-size:12px;
    font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
  .seg button.on{background:var(--aDim);color:var(--a)}
  a.link{color:var(--bl);text-decoration:none;font-size:11px;font-family:'IBM Plex Mono',monospace}
  .flag{font-size:11px;line-height:1.5;border-radius:8px;padding:8px 12px;margin-top:8px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── MODEL: targets recompute from weight + goal (same formulas as the tracker) ────
var BASELINE_KCAL = 2748, BASELINE_WT = 167.5;     // tracker's anchor
var PLAN_BASELINE_WT = 165.5;                         // weight the food templates were built at
var DINNER = { c:70, p:70, f:45, cal:965 };
var SMOOTHIE = { name:"Recovery Smoothie (2 banana, 3/4c nonfat oat milk)", m:{c:86,p:43,f:5}, gC:0 };

// goal multipliers: recomp = maintenance, gain = +10%
var GOAL_MULT = { recomp:1.00, gain:1.10 };
var GOAL_LABEL = { recomp:"Recomposition", gain:"Lean Gain" };

// Daytime meals per plan (Recomp baseline; gC = carbs added for Lean Gain). Built at 164 lb.
var MEALS = {
  breakfast:{
    D:{name:"4 Eggs + Toast + Nut Butter + Banana",m:{c:60,p:26,f:22},gC:18,
       items:["4 whole eggs scrambled (nonstick, no added oil)","2 slices Ezekiel/sprouted toast","1 tbsp natural peanut/almond butter","1 medium banana"],
       gain:["Add 1/2 cup cooked oats + cinnamon","+1 tsp honey"]},
    A:{name:"Oats + 3 Eggs + Almond Butter + Berries",m:{c:60,p:26,f:22},gC:18,
       items:["3/4 cup rolled oats cooked in water","3 whole eggs scrambled (nonstick)","1 tbsp almond butter stirred into oats","1/2 cup blueberries"],
       gain:["Bump oats to 1 cup","+1/2 banana sliced in"]},
    B:{name:"Overnight Oats + Whey + Chia + PB",m:{c:60,p:26,f:22},gC:18,
       items:["Overnight oats: 3/4 cup oats + 1 cup lactose-free/oat milk + 1 scoop whey isolate + 1 tbsp chia","1 tbsp peanut butter","1/2 cup strawberries"],
       gain:["Bump oats to 1 cup + splash more milk","+1 tsp honey"]},
  },
  snack1:{
    D:{name:"Greek Yogurt + Almonds + Apple",m:{c:18,p:12,f:10},gC:8,
       items:["3/4 cup nonfat Greek yogurt","14 almonds (~1/2 oz)","1/2 medium apple, sliced + cinnamon"],
       gain:["Use a whole apple","+1 rice cake"]},
    A:{name:"Greek Yogurt + Walnuts + Apple",m:{c:18,p:12,f:10},gC:8,
       items:["3/4 cup nonfat Greek yogurt","1/2 oz walnuts","1/2 apple, sliced + cinnamon"],
       gain:["Use a whole apple","+1 large rice cake"]},
    B:{name:"Rice Cake + PB + Greek Yogurt",m:{c:18,p:12,f:10},gC:8,
       items:["1 rice cake + 1 tbsp peanut butter","1/2 cup nonfat Greek yogurt + cinnamon"],
       gain:["+1 second rice cake + 1/2 banana"]},
  },
  lunch:{
    D:{name:"Egg Fried Rice + Chicken + Avocado",m:{c:86,p:24,f:18},gC:24,
       items:["3 oz diced chicken + 1 egg scrambled into 1.5 cups jasmine rice","1 cup stir-fry vegetables","1/4 avocado sliced on top","1/2 tsp sesame oil + soy + sriracha"],
       gain:["Bump rice to 2.25 cups cooked","+1/2 cup pineapple in stir-fry"]},
    A:{name:"Chicken + Jasmine Rice + Broccoli + Avocado",m:{c:86,p:24,f:18},gC:24,
       items:["3.5 oz grilled chicken breast","1.5 cups cooked jasmine rice","1 cup roasted broccoli (1 tsp olive oil)","1/4 avocado"],
       gain:["Bump rice to 2.25 cups cooked","+1 small roasted sweet potato"]},
    B:{name:"Turkey Quinoa Bowl + Beans + Avocado",m:{c:86,p:24,f:18},gC:24,
       items:["1.5 cups cooked quinoa + 3.5 oz ground turkey (93% lean)","1/2 cup black beans","Roasted peppers & onions","1/4 avocado + 2 tbsp salsa verde + lime"],
       gain:["Bump quinoa to 2.25 cups cooked","+1/2 cup extra black beans"]},
  },
};
var PLAN_DESC = {
  D:"Egg-Forward Express — eggs at every opportunity, 5-8 min breakfast, batch-prepped snack.",
  A:"Performance Fuel — carb-forward around training, oat + egg breakfast, rice-heavy pre-training lunch.",
  B:"Meal Prep Powerhouse — Sunday batch focus, overnight oats, quinoa-turkey bowls grab-and-go.",
};
var ROTS = [
  { id:1, name:"Balanced Mix", desc:"Even plan distribution; no plan repeats more than two days running.",
    days:[["Mon","D"],["Tue","A"],["Wed","B"],["Thu","D"],["Fri","A"],["Sat","B"]] },
  { id:2, name:"Egg Lover's Priority", desc:"Plan D dominates — eggs at every opportunity. Plan A mid-week for variety.",
    days:[["Mon","D"],["Tue","D"],["Wed","A"],["Thu","D"],["Fri","D"],["Sat","A"]] },
  { id:3, name:"Minimal Effort", desc:"Batch-prep plans B and D for near-zero weekday effort.",
    days:[["Mon","D"],["Tue","B"],["Wed","D"],["Thu","B"],["Fri","D"],["Sat","B"]] },
];

var PC = { A:"#4a8fe8", B:"#e8a838", D:"#3dd9a0", S:"#3dd9a0" };

// ─── STATE ─────────────────────────────────────────────────────────────────────
var state = { weight:164, goal:"gain", view:"plans", plan:"D", rot:2, open:{},
  // InBody scan inputs (Tier 2/3). If bmr+ffm present, targets key off them; else weight fallback.
  inbody:{ date:"2026-07-11", weight:165.5, bodyFat:11.1, smm:84.0, ffm:147.1, bmr:1812, vfa:null },
  activity:1.55,   // training activity factor (5-6 d/wk); user-adjustable
  scans:[{date:"2026-07-11",weight:165.5,bodyFat:11.1,smm:84.0,ffm:147.1,bmr:1812,vfa:null},{date:"2026-01-28",weight:167.5,bodyFat:14.8,smm:81.4,ffm:142.6,bmr:1768,vfa:46.9}] };      // history of logged scans for trend
function load(){ try{ var s=localStorage.getItem("matt_meals_v1"); if(s) state=Object.assign(state,JSON.parse(s)); }catch(e){} }
function save(){ try{ localStorage.setItem("matt_meals_v1",JSON.stringify(state)); }catch(e){} }

// ─── TARGET MATH (mirrors tracker) ───────────────────────────────────────────────
// Explicit trainer-aligned targets (set July 2026 from InBody + trainer guidance).
// Gain = muscle-growth surplus (trainer band 3000-3200); recomp = lower-carb hold.
var EXPLICIT_TARGETS = {
  gain:   { p:175, c:370, f:100 },   // 3080 kcal -- protein topped, surplus carb-driven
  recomp: { p:175, c:300, f:95 },    // 2755 kcal -- maintenance-ish, leaner carb
  fatloss:{ p:180, c:230, f:85 }     // 2405 kcal -- protein-sparing deficit
};
function targets(weight, goal){
  var ib = state.inbody || {};
  var t = EXPLICIT_TARGETS[goal] || EXPLICIT_TARGETS.gain;
  var p = t.p, cc = t.c, f = t.f;
  var kcal = p*4 + cc*4 + f*9;
  return { kcal:kcal, c:cc, p:p, f:f, usedBMR:!!(ib.bmr),
    day:{ c:cc-DINNER.c, p:p-DINNER.p, f:f-DINNER.f } };
}
function mealM(slot, plan, goal){
  var b = MEALS[slot][plan]; var addC = goal==="gain" ? (b.gC||0) : 0;
  return { c:b.m.c+addC, p:b.m.p, f:b.m.f };
}
function dayM(plan, goal){
  var b=mealM("breakfast",plan,goal), s=mealM("snack1",plan,goal), l=mealM("lunch",plan,goal), sm=SMOOTHIE.m;
  return { c:b.c+s.c+l.c+sm.c, p:b.p+s.p+l.p+sm.p, f:b.f+s.f+l.f+sm.f };
}
function kcal(m){ return Math.round(m.c*4+m.p*4+m.f*9); }

// ─── RENDER ──────────────────────────────────────────────────────────────────────
function el(html){ var d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }

function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var t=targets(state.weight, state.goal);
  var drift=Math.abs(state.weight-PLAN_BASELINE_WT);

  // Header
  app.appendChild(el(
    '<div style="margin-bottom:14px">'+
      '<div class="eyebrow">Daytime Fuel · 6 Days</div>'+
      '<h1>Meal Plans</h1>'+
      '<div class="sub">Weight-aware targets · dinner separate ('+DINNER.c+'C/'+DINNER.p+'P/'+DINNER.f+'F) · '+
      '<a class="link" href="index.html">&#8592; Tracker</a></div>'+
    '</div>'));

  // Weight + goal controls
  var ctrl=el('<div class="card" style="padding:12px 14px;margin-bottom:12px"></div>');
  ctrl.appendChild(el('<div class="lbl" style="margin-bottom:8px">Your numbers</div>'));
  var grid=el('<div style="display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:center"></div>');
  var winp=el('<input type="number" id="wt" step="0.5" value="'+state.weight+'">');
  winp.addEventListener("change",function(){ var v=parseFloat(this.value); if(v>0){ state.weight=v; save(); render(); }});
  var wwrap=el('<div></div>'); wwrap.appendChild(winp); wwrap.appendChild(el('<div class="lbl" style="text-align:center;margin-top:3px">lbs</div>'));
  grid.appendChild(wwrap);
  var seg=el('<div class="seg"></div>');
  ["recomp","gain"].forEach(function(g){
    var b=el('<button class="'+(state.goal===g?"on":"")+'">'+GOAL_LABEL[g]+'</button>');
    b.addEventListener("click",function(){ state.goal=g; save(); render(); });
    seg.appendChild(b);
  });
  grid.appendChild(seg);
  ctrl.appendChild(grid);

  // live targets
  ctrl.appendChild(el(
    '<div class="mono" style="margin-top:10px;font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">'+
      '<span style="color:var(--tm)">Daily target</span>'+
      '<span><span style="color:var(--a)">'+t.c+'C</span> / <span style="color:var(--d)">'+t.p+'P</span> / <span style="color:var(--w)">'+t.f+'F</span> <span style="color:var(--td)">'+t.kcal+' cal</span></span>'+
    '</div>'+
    '<div class="mono" style="margin-top:4px;font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px">'+
      '<span style="color:var(--tm)">Daytime budget</span>'+
      '<span><span style="color:var(--a)">'+t.day.c+'C</span> / <span style="color:var(--d)">'+t.day.p+'P</span> / <span style="color:var(--w)">'+t.day.f+'F</span> <span style="color:var(--td)">~'+(t.kcal-DINNER.cal)+' cal</span></span>'+
    '</div>'));

  // drift flag
  if(drift>=5){
    ctrl.appendChild(el('<div class="flag" style="background:#2a1e08;color:var(--w);border:1px solid #4a3410">'+
      '&#9888; You\'re '+drift.toFixed(1)+' lb from the '+PLAN_BASELINE_WT+' lb the food portions were built at. Targets above are correct, but the meal portions are worth refreshing &mdash; ask Claude to regenerate at your current weight.</div>'));
  } else if(drift>=3){
    ctrl.appendChild(el('<div class="flag" style="background:var(--s);color:var(--tm);border:1px solid var(--b)">'+
      'Portions still fit ('+drift.toFixed(1)+' lb from baseline). Refresh when you pass ~5 lb of drift.</div>'));
  }
  app.appendChild(ctrl);

  // InBody scan panel (Tier 2 + 3)
  renderInBodyPanel(app);

  // View toggle
  var vt=el('<div class="row" style="margin-bottom:12px"></div>');
  [["plans","Daily Plans"],["rotation","Weekly Rotation"]].forEach(function(v){
    var b=el('<button class="btn '+(state.view===v[0]?"on":"")+'">'+v[1]+'</button>');
    b.addEventListener("click",function(){ state.view=v[0]; save(); render(); });
    vt.appendChild(b);
  });
  app.appendChild(vt);

  if(state.view==="plans") renderPlans(app,t);
  else renderRotation(app,t);

  app.appendChild(el('<div class="mono" style="margin-top:14px;font-size:9px;color:var(--td);text-align:center;line-height:1.6">'+
    'Tap any day/meal to expand · only carbs change between goals (P/F held) · &#129371; = post-training smoothie</div>'));
}

function macroSpan(m){
  return '<span class="mono" style="font-size:10px"><span style="color:var(--a)">C:'+Math.round(m.c)+'</span> '+
    '<span style="color:var(--d)">P:'+Math.round(m.p)+'</span> '+
    '<span style="color:var(--w)">F:'+Math.round(m.f)+'</span> '+
    '<span style="color:var(--tm)">'+kcal(m)+'</span></span>';
}

var WORKER_PROXY = "https://tracker-ai.msmyers4.workers.dev/";

function handleScanPhoto(e){
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  var status = document.getElementById("ibstatus");
  if (status) status.textContent = "Reading scan photo...";
  var reader = new FileReader();
  reader.onload = function(){
    var dataUrl = reader.result;
    var b64 = dataUrl.split(",")[1];
    var mediaType = (dataUrl.match(/data:([^;]+);/)||[])[1] || "image/jpeg";
    extractScanFromImage(b64, mediaType, status);
  };
  reader.onerror = function(){ if(status) status.textContent = "Could not read the image file."; };
  reader.readAsDataURL(file);
}

function extractScanFromImage(b64, mediaType, status){
  var prompt = "This is an InBody body composition result sheet. Extract these fields and respond with ONLY a JSON object, no prose, no markdown fences. Keys and units: weight (lb), bodyFat (percent body fat, number only), smm (skeletal muscle mass lb), ffm (fat-free mass lb), bmr (basal metabolic rate kcal), vfa (visceral fat area cm2), date (scan date YYYY-MM-DD if visible else empty string). If a field is not visible, use null. Convert kg to lb if the sheet is metric (1 kg = 2.20462 lb).";
  var body = {
    model: "claude-sonnet-4-5-20250929",
    max_tokens: 400,
    messages: [{ role:"user", content:[
      { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } },
      { type:"text", text:prompt }
    ]}]
  };
  fetch(WORKER_PROXY, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var text = "";
      if (data && data.content) {
        for (var i=0;i<data.content.length;i++){ if(data.content[i].type==="text") text += data.content[i].text; }
      }
      var scan = parseScanJSON(text);
      if (!scan){ if(status) status.textContent = "Could not parse the sheet. Enter the numbers manually below."; return; }
      // Populate the manual fields for confirmation (do NOT auto-apply)
      var map = ["date","weight","bodyFat","smm","ffm","bmr","vfa"];
      map.forEach(function(k){
        var inp = document.getElementById("ib_"+k);
        if (inp && scan[k] !== null && scan[k] !== undefined && scan[k] !== "") inp.value = scan[k];
      });
      if (status) status.innerHTML = '<span style="color:var(--a)">Read the sheet &mdash; check the fields below, then tap Apply.</span>';
    })
    .catch(function(err){
      if (status) status.textContent = "Network error reaching the AI proxy. Enter manually, or check the Worker is up.";
    });
}

function parseScanJSON(text){
  if (!text) return null;
  // strip markdown fences
  var t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  // grab first {...} block
  var m = t.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try {
    var o = JSON.parse(m[0]);
    return {
      date: o.date || "",
      weight: numOrNull(o.weight), bodyFat: numOrNull(o.bodyFat), smm: numOrNull(o.smm),
      ffm: numOrNull(o.ffm), bmr: numOrNull(o.bmr), vfa: numOrNull(o.vfa)
    };
  } catch(e){ return null; }
}
function numOrNull(v){ if(v===null||v===undefined||v==="") return null; var n=parseFloat(v); return isNaN(n)?null:n; }

function applyScan(scan){
  // scan: {date, weight, bodyFat, smm, ffm, bmr, vfa}
  state.inbody = Object.assign({}, scan);
  if (scan.weight) state.weight = scan.weight;
  // log to history (newest first), dedupe by date
  state.scans = (state.scans||[]).filter(function(s){ return s.date !== scan.date; });
  state.scans.unshift(Object.assign({}, scan));
  if (state.scans.length > 24) state.scans = state.scans.slice(0,24);
  save();
}

function renderInBodyPanel(app){
  var ib = state.inbody || {};
  var panel = el('<div class="card" style="padding:12px 14px;margin-bottom:12px"></div>');
  var headOpen = !!state.open["_ibpanel"];
  var head = el('<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">'+
    '<span class="lbl">&#128202; InBody scan &mdash; targets ' + (ib.bmr ? 'keyed off measured BMR + lean mass' : 'using weight estimate') + '</span>'+
    '<span class="mono" style="font-size:11px;color:var(--a)">' + (headOpen?"&#9660;":"&#9654;") + '</span></div>');
  head.addEventListener("click",function(){ state.open["_ibpanel"]=!headOpen; save(); render(); });
  panel.appendChild(head);

  if (headOpen){
    var body = el('<div style="margin-top:10px"></div>');

    // Photo extraction (Tier 3)
    body.appendChild(el('<div class="lbl" style="margin-bottom:6px">Scan from photo</div>'));
    var photoRow = el('<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"></div>');
    var fileInp = el('<input type="file" accept="image/*" id="ibphoto" style="display:none">');
    var photoBtn = el('<button class="btn" style="flex:1">&#128247; Photograph result sheet</button>');
    photoBtn.addEventListener("click",function(){ fileInp.click(); });
    fileInp.addEventListener("change",function(e){ handleScanPhoto(e); });
    photoRow.appendChild(photoBtn);
    body.appendChild(photoRow);
    body.appendChild(fileInp);
    body.appendChild(el('<div id="ibstatus" class="mono" style="font-size:10px;color:var(--tm);min-height:14px;margin-bottom:8px"></div>'));

    body.appendChild(el('<div class="lbl" style="margin:6px 0">Or enter manually (from your PDF sheet)</div>'));
    var fields = [
      ["date","Scan date","",  "date"],
      ["weight","Weight (lb)", ib.weight||"", "number"],
      ["bodyFat","Body fat %", ib.bodyFat||"", "number"],
      ["smm","Skeletal muscle mass (lb)", ib.smm||"", "number"],
      ["ffm","Fat-free mass (lb)", ib.ffm||"", "number"],
      ["bmr","BMR (kcal)", ib.bmr||"", "number"],
      ["vfa","Visceral fat area (cm2)", ib.vfa||"", "number"],
    ];
    var grid = el('<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>');
    fields.forEach(function(fd){
      var wrap = el('<div></div>');
      wrap.appendChild(el('<div class="lbl" style="margin-bottom:3px;font-size:8px">'+fd[1]+'</div>'));
      var step = fd[0]==="bmr" ? "1" : "0.1";
      var inp = el('<input type="'+fd[3]+'" id="ib_'+fd[0]+'" '+(fd[3]==="number"?'step="'+step+'"':'')+' value="'+fd[2]+'" style="font-size:13px;padding:6px 8px">');
      wrap.appendChild(inp);
      grid.appendChild(wrap);
    });
    body.appendChild(grid);

    // activity factor
    body.appendChild(el('<div class="lbl" style="margin:10px 0 4px">Activity factor (BMR multiplier) &mdash; '+(state.activity||1.55)+'</div>'));
    var actRow = el('<div class="row"></div>');
    [["1.45","Lighter"],["1.55","Current"],["1.65","Heavy"]].forEach(function(a){
      var on = String(state.activity)===a[0];
      var b = el('<button class="btn '+(on?"on":"")+'">'+a[1]+'<div class="k">x'+a[0]+'</div></button>');
      b.addEventListener("click",function(){ state.activity=parseFloat(a[0]); save(); render(); });
      actRow.appendChild(b);
    });
    body.appendChild(actRow);

    var applyBtn = el('<button class="btn on" style="width:100%;margin-top:10px;padding:10px">Apply scan &amp; recompute targets</button>');
    applyBtn.addEventListener("click",function(){
      var scan = {
        date: (document.getElementById("ib_date").value)||(new Date().toISOString().slice(0,10)),
        weight: parseFloat(document.getElementById("ib_weight").value)||state.weight,
        bodyFat: parseFloat(document.getElementById("ib_bodyFat").value)||null,
        smm: parseFloat(document.getElementById("ib_smm").value)||null,
        ffm: parseFloat(document.getElementById("ib_ffm").value)||null,
        bmr: parseFloat(document.getElementById("ib_bmr").value)||null,
        vfa: parseFloat(document.getElementById("ib_vfa").value)||null,
      };
      applyScan(scan); render();
    });
    body.appendChild(applyBtn);
    body.appendChild(el('<div class="mono" style="font-size:9px;color:var(--td);margin-top:6px;line-height:1.5">'+
      'BMR is the best anchor for calories; lean mass (FFM) for protein. InBody BMR is an estimate &mdash; trust your 2-3 week weight trend to confirm the activity factor is right.</div>'));

    // scan history / trend
    if (state.scans && state.scans.length){
      body.appendChild(el('<div class="lbl" style="margin:12px 0 6px">Scan history</div>'));
      var hist = el('<div></div>');
      state.scans.slice(0,6).forEach(function(s){
        hist.appendChild(el('<div class="mono" style="font-size:10px;color:var(--tm);display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--b)">'+
          '<span>'+(s.date||"?")+'</span>'+
          '<span>'+(s.weight?s.weight+'lb':'')+(s.bodyFat?' &middot; '+s.bodyFat+'%':'')+(s.smm?' &middot; SMM '+s.smm:'')+(s.bmr?' &middot; BMR '+s.bmr:'')+'</span></div>'));
      });
      body.appendChild(hist);
    }

    panel.appendChild(body);
  }
  app.appendChild(panel);
}

function renderPlans(app,t){
  // plan toggle
  var pt=el('<div class="row" style="margin-bottom:12px"></div>');
  ["D","A","B"].forEach(function(p){
    var b=el('<button class="btn '+(state.plan===p?"on":"")+'">Plan '+p+'</button>');
    b.addEventListener("click",function(){ state.plan=p; save(); render(); });
    pt.appendChild(b);
  });
  app.appendChild(pt);
  app.appendChild(el('<div class="card" style="padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--tm);line-height:1.5;border-left:3px solid var(--a)">'+PLAN_DESC[state.plan]+'</div>'));

  var slots=[["breakfast","Breakfast","6:15-6:30 AM"],["snack1","Snack 1 (mid-morning)","10:00-10:30 AM"],["lunch","Lunch — PRE-TRAINING","12:30-1:00 PM"]];
  slots.forEach(function(sl){
    var meal=MEALS[sl[0]][state.plan]; var m=mealM(sl[0],state.plan,state.goal);
    var key="p_"+state.plan+"_"+sl[0];
    var open=!!state.open[key];
    var card=el('<div class="day"></div>');
    card.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'+
      '<div><div style="font-size:13px;font-weight:600;color:var(--t)">'+meal.name+'</div>'+
      '<div class="lbl" style="margin-top:2px">'+sl[1]+' &middot; '+sl[2]+'</div></div>'+
      '<div style="text-align:right;flex-shrink:0">'+macroSpan(m)+'</div></div>'));
    if(open){
      var det='<ul style="margin:8px 0 0;padding-left:16px;color:#aab;font-size:12px;line-height:1.7">';
      meal.items.forEach(function(it){ det+='<li>'+it+'</li>'; });
      if(state.goal==="gain" && meal.gain) meal.gain.forEach(function(it){ det+='<li style="color:var(--a)">'+it+' <span style="color:var(--td);font-size:10px">(lean gain)</span></li>'; });
      det+='</ul>';
      card.appendChild(el('<div style="border-top:1px solid var(--b);margin-top:8px;padding-top:6px">'+det+'</div>'));
    }
    card.addEventListener("click",function(){ state.open[key]=!open; save(); render(); });
    app.appendChild(card);
  });

  // smoothie (fixed)
  var sm=SMOOTHIE.m, skey="p_smoothie", sopen=!!state.open[skey];
  var scard=el('<div class="day" style="background:#0a1a14;border-color:#1a3a2a"></div>');
  scard.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'+
    '<div><div style="font-size:13px;font-weight:600;color:var(--a)">&#129371; '+SMOOTHIE.name+'</div>'+
    '<div class="lbl" style="margin-top:2px">Snack 2 — POST-TRAINING &middot; ~4:00 PM</div></div>'+
    '<div style="text-align:right;flex-shrink:0">'+macroSpan(sm)+'</div></div>'));
  if(sopen){
    scard.appendChild(el('<div style="border-top:1px solid #1a3a2a;margin-top:8px;padding-top:6px">'+
      '<ul style="margin:0;padding-left:16px;color:#9bba9f;font-size:12px;line-height:1.7">'+
      '<li>1.5 scoops BPN vanilla whey protein</li><li>2 medium bananas (5-6 in)</li>'+
      '<li>3/4 cup blueberries</li><li>3/4 cup nonfat oat milk + water to blend</li>'+
      '<li>5g creatine monohydrate</li></ul></div>'));
  }
  scard.addEventListener("click",function(){ state.open[skey]=!sopen; save(); render(); });
  app.appendChild(scard);

  // totals vs budget
  var d=dayM(state.plan,state.goal);
  var full={c:Math.round(d.c)+DINNER.c,p:Math.round(d.p)+DINNER.p,f:Math.round(d.f)+DINNER.f};
  app.appendChild(el('<div class="card" style="padding:12px 14px;margin-top:12px">'+
    '<div class="lbl" style="margin-bottom:8px">Plan '+state.plan+' daytime total — '+GOAL_LABEL[state.goal]+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center">'+
      tcell(kcal(d),"",  "#fff")+tcell(Math.round(d.c),"g","var(--a)")+tcell(Math.round(d.p),"g","var(--d)")+tcell(Math.round(d.f),"g","var(--w)")+
    '</div>'+
    '<div class="mono" style="margin-top:9px;font-size:10px;color:var(--td);text-align:center;line-height:1.5">'+
      'vs budget '+t.day.c+'C / '+t.day.p+'P / '+t.day.f+'F &middot; + dinner = full day ~'+(kcal(d)+DINNER.cal)+' cal ('+full.c+'C/'+full.p+'P/'+full.f+'F)</div>'+
  '</div>'));
}

function tcell(v,u,c){
  return '<div><div class="mono" style="font-size:18px;font-weight:700;color:'+c+'">'+v+'<span style="font-size:10px;color:var(--td)">'+u+'</span></div></div>';
}

function renderRotation(app,t){
  var rt=el('<div class="row" style="margin-bottom:12px;flex-wrap:wrap"></div>');
  ROTS.forEach(function(r){
    var b=el('<button class="btn '+(state.rot===r.id?"on":"")+'" style="min-width:100px">'+r.name+'</button>');
    b.addEventListener("click",function(){ state.rot=r.id; save(); render(); });
    rt.appendChild(b);
  });
  app.appendChild(rt);
  var rot=ROTS.find(function(r){return r.id===state.rot;});
  app.appendChild(el('<div class="card" style="padding:9px 12px;margin-bottom:12px;font-size:11px;color:var(--tm);line-height:1.5;border-left:3px solid var(--a)">'+rot.desc+'</div>'));

  var tc=0,tp=0,tf=0;
  rot.days.forEach(function(dy){
    var plan=dy[1], m=dayM(plan,state.goal); tc+=m.c;tp+=m.p;tf+=m.f;
    var key="r_"+state.rot+"_"+dy[0], open=!!state.open[key];
    var card=el('<div class="day"></div>');
    card.appendChild(el('<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">'+dy[0]+'</span>'+
      '<span class="mono" style="font-size:9px;color:'+PC[plan]+';text-transform:uppercase;letter-spacing:1px;font-weight:600">Plan '+plan+'</span></div>'+
      '<div>'+macroSpan(m)+'</div></div>'));
    if(open){
      var rows="";
      [["breakfast","Breakfast"],["snack1","Snack 1"],["lunch","Lunch (PRE)"]].forEach(function(sl){
        var mm=mealM(sl[0],plan,state.goal);
        rows+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;gap:8px">'+
          '<span style="color:var(--tm)">'+sl[1]+'</span>'+
          '<span style="color:'+PC[plan]+';text-align:right">'+MEALS[sl[0]][plan].name+' <span style="color:var(--td);font-size:10px">'+kcal(mm)+'</span></span></div>';
      });
      rows+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;gap:8px">'+
        '<span style="color:var(--tm)">Smoothie (POST)</span>'+
        '<span style="color:var(--a);text-align:right">&#129371; '+kcal(SMOOTHIE.m)+'</span></div>';
      card.appendChild(el('<div style="border-top:1px solid var(--b);margin-top:8px;padding-top:6px">'+rows+'</div>'));
    }
    card.addEventListener("click",function(){ state.open[key]=!open; save(); render(); });
    app.appendChild(card);
  });

  var n=rot.days.length;
  var avg={c:tc/n,p:tp/n,f:tf/n};
  app.appendChild(el('<div class="card" style="padding:12px 14px;margin-top:12px">'+
    '<div class="lbl" style="margin-bottom:8px">Daily average (daytime) — '+GOAL_LABEL[state.goal]+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center">'+
      tcell(kcal(avg),"","#fff")+tcell(Math.round(avg.c),"g","var(--a)")+tcell(Math.round(avg.p),"g","var(--d)")+tcell(Math.round(avg.f),"g","var(--w)")+
    '</div>'+
    '<div class="mono" style="margin-top:9px;font-size:10px;color:var(--td);text-align:center;line-height:1.5">'+
      'vs budget '+t.day.c+'C / '+t.day.p+'P / '+t.day.f+'F &middot; + dinner ~'+DINNER.cal+' = ~'+(kcal(avg)+DINNER.cal)+' cal/day</div>'+
  '</div>'));
}

load(); render();
</script>
</body>
</html>
